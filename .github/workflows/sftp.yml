# .github/workflows/deploy.yml
name: Deploy to KataBump via SFTP

# 触发部署的条件：当代码被推送到 main 或 master 分支时
on:
  push:
    branches: [ main, master ]
  # 允许你手动在 GitHub Actions 页面触发部署
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取你 GitHub 仓库中的最新代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. 安装项目依赖
      - name: Install dependencies
        run: npm install

      # 4. （可选）执行生产环境的构建脚本，如 TypeScript 编译
      - name: Build project
        run: npm run build

      # 5. 通过 SFTP 部署文件到 KataBump
      - name: Deploy to KataBump via SFTP
        uses: milanmk/actions-file-deployer@master
        with:
          # 连接协议
          remote-protocol: "sftp"
          # 服务器地址（不要包含端口号）
          remote-host: "${{ secrets.KATABUMP_HOST }}"
          # SFTP 端口
          remote-port: "${{ secrets.KATABUMP_PORT }}"
          # 你的用户名
          remote-user: "${{ secrets.KATABUMP_USERNAME }}"
          # 登录密码
          remote-password: "${{ secrets.KATABUMP_PASSWORD }}"
          # 文件上传的目标路径
          remote-path: "${{ secrets.REMOTE_TARGET_DIR }}"
          # 部署策略：delta 只会上传更改过的文件，速度更快
          sync: "delta"