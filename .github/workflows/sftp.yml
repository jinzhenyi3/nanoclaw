name: Deploy to KataBump via SFTP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project (if needed)
        run: npm run build || echo "No build script"

      - name: Deploy to KataBump via SFTP
        uses: milanmk/actions-file-deployer@master
        with:
          remote-protocol: "sftp"
          remote-host: "${{ secrets.KATABUMP_HOST }}"
          remote-port: "${{ secrets.KATABUMP_PORT }}"
          remote-user: "${{ secrets.KATABUMP_USERNAME }}"
          remote-password: "${{ secrets.KATABUMP_PASSWORD }}"
          remote-path: "${{ secrets.REMOTE_TARGET_DIR }}"
          sync: "delta"